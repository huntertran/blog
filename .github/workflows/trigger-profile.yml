name: Trigger profile repo workflow

on:
  push:
    branches:
      - master

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for blog to update
        # GitHub Pages usually takes a few minutes to reflect the new deploy
        run: sleep 300

      - name: Trigger blog post workflow in profile repo
        env:
          BLOG_REPO_TOKEN: ${{ secrets.BLOG_REPO_TOKEN }}
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${BLOG_REPO_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/huntertran/huntertran/actions/workflows/blog-post-workflow.yml/dispatches \
            -d '{"ref":"master"}'
